version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: hireiq-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-hireiq}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-hireiq}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hireiq-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-hireiq}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-supersecretjwtkeyforhireiqplatform2026!}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-120}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      # Avoid mapping site-packages or cached models so they remain in-container
      - /app/venv/
      - /root/.cache/

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hireiq-frontend
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules/

volumes:
  db_data:
